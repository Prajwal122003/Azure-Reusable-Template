name: Create Azure VM

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: SERVICE_PRINCIPAL

    - name: Create Windows VM
      run: |
        az group create --name github-vm-rg --location eastus
        az vm create \
          --resource-group github-vm-rg1 \
          --name github-vm \
          --image Win2022Datacenter \
          --admin-username azureuser \
          --admin-password ${{ secrets.WINDOWS_ADMIN_PASSWORD }} \
          --size Standard_B2s
