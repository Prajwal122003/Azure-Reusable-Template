name: Create Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: SERVICE_PRINCIPAL

    - name: Create VM
      run: |
        az group create --name github-vm-rg --location eastus
        az vm create \
          --resource-group github-vm-rg \
          --name github-vm \
          --image Ubuntu2204 \
          --admin-username azureuser \
          --generate-ssh-keys \
          --size Standard_B1s

